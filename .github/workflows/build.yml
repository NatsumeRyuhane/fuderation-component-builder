name: Build component

on:
  push:
    branches: [main]
    # The bot commit below only touches component.json — ignore it so the push
    # does not re-trigger this workflow (belt-and-suspenders with [skip ci]).
    paths-ignore:
      - 'component.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-component-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build component.json
        run: npm run build

      # Only commit on pushes to main / manual runs — pull_request runs validate only.
      - name: Commit component.json to main
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f component.json
          if git diff --cached --quiet; then
            echo "component.json unchanged — nothing to commit."
          else
            git commit -m "build: update component.json [skip ci]"
            git push origin HEAD:main
          fi
